<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="google-signin-client_id" content="47102161738-q0g0ssheku8r86uivd2g5e2366mqefcg.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nin_guide">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Natur i Norge guide</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#37474f">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #37474f;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: #37474f;
      color: #ffffff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.35s ease;
    }

    #splash.removing {
      opacity: 0;
      pointer-events: none;
    }

    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    #splash h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    #splash p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #81c784;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash" role="status" aria-live="polite" aria-busy="true">
    <img src="icons/Icon-192.png" alt="" width="96" height="96">
    <h1>Natur i Norge guide</h1>
    <div class="spinner" aria-hidden="true"></div>
    <p id="splash-status">Laster appen …</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('removing');
      splash.setAttribute('aria-busy', 'false');
      setTimeout(function () { splash.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
